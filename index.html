<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N倍放心醫療計畫</title>
    <!-- 載入必要 CDN 套件 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #F8FAFC;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* 防止長數字溢出 */
        .text-fit {
            word-break: break-all;
            overflow-wrap: anywhere;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [db, setDb] = useState(null);
            const [loading, setLoading] = useState(true);
            const [formData, setFormData] = useState({
                name: '', gender: 'male', birthYear: '', birthMonth: '', birthDay: '',
                product: 'HAB', term: '20', plan: '2'
            });

            const [insAge, setInsAge] = useState(0);
            const [annualPremium, setAnnualPremium] = useState(0);
            const monthRef = useRef(null);
            const dayRef = useRef(null);

            // 數據庫載入
            useEffect(() => {
                const loadDB = async () => {
                    try {
                        const response = await fetch('./insurance_rates_db.json');
                        if (!response.ok) throw new Error('DB missing');
                        const data = await response.json();
                        const processed = data.rates.reduce((acc, curr) => {
                            const { insurance_type, payment_term, gender, plan_level, age, annual_premium } = curr;
                            if (!acc[insurance_type]) acc[insurance_type] = {};
                            if (!acc[insurance_type][payment_term]) acc[insurance_type][payment_term] = {};
                            if (!acc[insurance_type][payment_term][gender]) acc[insurance_type][payment_term][gender] = {};
                            if (!acc[insurance_type][payment_term][gender][plan_level]) acc[insurance_type][payment_term][gender][plan_level] = {};
                            acc[insurance_type][payment_term][gender][plan_level][age] = annual_premium;
                            return acc;
                        }, {});
                        setDb(processed);
                    } catch (e) {
                        const MOCK_DB = { 
                            "HAB": { "20": { "M": { "2": { 0: 28930, 19: 44150, 20: 45200, 36: 66360 } } } },
                            "HAA": { "20": { "M": { "2": { 0: 27000, 36: 59660 } } } }
                        };
                        setDb(MOCK_DB);
                    } finally {
                        setLoading(false);
                    }
                };
                loadDB();
            }, []);

            // 年齡計算
            useEffect(() => {
                if (formData.birthYear.length === 4 && formData.birthMonth && formData.birthDay) {
                    const birthDate = new Date(`${formData.birthYear}-${formData.birthMonth}-${formData.birthDay}`);
                    if (!isNaN(birthDate.getTime())) {
                        const today = new Date();
                        let age = today.getFullYear() - birthDate.getFullYear();
                        const m = today.getMonth() - birthDate.getMonth();
                        const d = today.getDate() - birthDate.getDate();
                        let totalM = m + (d < 0 ? -1 : 0);
                        if (totalM < 0) { age--; totalM += 12; }
                        setInsAge(totalM >= 6 ? age + 1 : age);
                    }
                }
            }, [formData.birthYear, formData.birthMonth, formData.birthDay]);

            // 查表
            useEffect(() => {
                if (!db) return;
                const price = db[formData.product]?.[formData.term]?.[formData.gender === 'male' ? 'M' : 'F']?.[formData.plan]?.[insAge];
                setAnnualPremium(price !== undefined ? price : -3);
            }, [formData, insAge, db]);

            const coverage = parseInt(formData.plan) * 2500000;
            const total = annualPremium > 0 ? annualPremium * parseInt(formData.term) : 0;
            const mag = total > 0 ? (coverage / total).toFixed(1) : 0;
            const fmt = (v) => new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', maximumFractionDigits: 0 }).format(v);

            if (loading) return <div className="h-screen flex items-center justify-center text-blue-600 animate-pulse font-black uppercase tracking-widest text-xs">Initializing System...</div>;

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-10 grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8 items-stretch">
                    
                    {/* 左側：控制面板 */}
                    <div className="lg:col-span-5 bg-white rounded-[2rem] shadow-2xl p-6 md:p-7 border border-slate-100 flex flex-col justify-between">
                        <div>
                            <div className="flex items-center gap-3 mb-6 md:mb-8">
                                <div className="bg-blue-600 p-2 rounded-xl text-white shadow-lg">
                                    <i data-lucide="calculator" className="w-5 h-5 md:w-6 md:h-6"></i>
                                </div>
                                <h1 className="text-lg md:text-xl font-black text-slate-900 italic tracking-tighter leading-none">N倍放心醫療計畫</h1>
                            </div>

                            <div className="space-y-5 md:space-y-6">
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] md:text-[11px] font-black text-slate-400 uppercase ml-1">客戶姓名</label>
                                        <input type="text" placeholder="姓名" className="w-full bg-slate-50 border border-slate-100 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-200 transition-all font-bold text-slate-700 text-sm md:text-base placeholder:font-normal placeholder:text-slate-300" 
                                            value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] md:text-[11px] font-black text-slate-400 uppercase ml-1">性別</label>
                                        <div className="grid grid-cols-2 gap-1.5 bg-slate-50 p-1 rounded-xl border border-slate-100 h-[46px] md:h-[50px]">
                                            <button onClick={() => setFormData({...formData, gender: 'male'})} className={`rounded-lg text-xs md:text-sm font-black transition-all ${formData.gender === 'male' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-400'}`}>男性</button>
                                            <button onClick={() => setFormData({...formData, gender: 'female'})} className={`rounded-lg text-xs md:text-sm font-black transition-all ${formData.gender === 'female' ? 'bg-white shadow-sm text-pink-600' : 'text-slate-400'}`}>女性</button>
                                        </div>
                                    </div>
                                </div>

                                <div className="space-y-1.5">
                                    <label className="text-[10px] md:text-[11px] font-black text-slate-400 uppercase ml-1">出生日期 (西元)</label>
                                    <div className="grid grid-cols-12 gap-1 items-center text-slate-700">
                                        <input type="text" placeholder="YYYY" className="col-span-5 bg-slate-50 border border-slate-100 rounded-xl p-3 text-center text-base md:text-lg font-mono font-bold focus:ring-2 focus:ring-blue-100 outline-none"
                                            value={formData.birthYear} onChange={(e) => setFormData({...formData, birthYear: e.target.value.replace(/\D/g, '').slice(0, 4)})} />
                                        <span className="col-span-1 text-center text-slate-300 font-bold">/</span>
                                        <input type="text" placeholder="MM" className="col-span-2 bg-slate-50 border border-slate-100 rounded-xl p-3 text-center text-base md:text-lg font-mono font-bold outline-none"
                                            value={formData.birthMonth} onChange={(e) => setFormData({...formData, birthMonth: e.target.value.replace(/\D/g, '').slice(0, 2)})} />
                                        <span className="col-span-1 text-center text-slate-300 font-bold">/</span>
                                        <input type="text" placeholder="DD" className="col-span-3 bg-slate-50 border border-slate-100 rounded-xl p-3 text-center text-base md:text-lg font-mono font-bold outline-none"
                                            value={formData.birthDay} onChange={(e) => setFormData({...formData, birthDay: e.target.value.replace(/\D/g, '').slice(0, 2)})} />
                                    </div>
                                    {insAge >= 0 && formData.birthYear && (
                                        <div className="flex items-center gap-1 mt-1 ml-1 text-blue-600">
                                            <i data-lucide="trending-up" className="w-3 h-3"></i>
                                            <span className="text-[10px] md:text-[11px] font-black italic">保險年齡：{insAge} 歲</span>
                                        </div>
                                    )}
                                </div>

                                <div className="space-y-1.5">
                                    <label className="text-[10px] md:text-[11px] font-black text-slate-400 uppercase ml-1">保障類型</label>
                                    <div className="relative flex p-1 bg-slate-100 rounded-2xl shadow-inner overflow-hidden">
                                        <div className={`absolute inset-y-1 w-[calc(50%-4px)] bg-white rounded-xl shadow-sm transition-transform duration-500 z-0 ${formData.product === 'HAB' ? 'translate-x-0' : 'translate-x-full'}`}></div>
                                        <button onClick={() => setFormData({...formData, product: 'HAB'})} className={`relative z-10 w-1/2 py-3 text-[9px] md:text-[10px] font-black transition-colors ${formData.product === 'HAB' ? 'text-blue-600' : 'text-slate-400'}`}>樂實足 HAB (至95歲)</button>
                                        <button onClick={() => setFormData({...formData, product: 'HAA'})} className={`relative z-10 w-1/2 py-3 text-[9px] md:text-[10px] font-black transition-colors ${formData.product === 'HAA' ? 'text-blue-600' : 'text-slate-400'}`}>樂實在 HAA (終身)</button>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] md:text-[11px] font-black text-slate-400 ml-1">繳費年期</label>
                                        <select className="w-full bg-slate-50 border border-slate-100 rounded-xl p-3 font-black text-slate-700 outline-none h-[46px] md:h-[50px] appearance-none text-sm md:text-base" value={formData.term} onChange={e => setFormData({...formData, term: e.target.value})}>
                                            <option value="10">10 年繳</option>
                                            <option value="20">20 年繳</option>
                                            <option value="30">30 年繳</option>
                                        </select>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] md:text-[11px] font-black text-slate-400 ml-1">保障計劃</label>
                                        <select className="w-full bg-slate-50 border border-slate-100 rounded-xl p-3 font-black text-slate-700 outline-none h-[46px] md:h-[50px] appearance-none text-sm md:text-base" value={formData.plan} onChange={e => setFormData({...formData, plan: e.target.value})}>
                                            <option value="1">計劃一 (250萬)</option>
                                            <option value="2">計劃二 (500萬)</option>
                                            <option value="3">計劃三 (750萬)</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 右側：核心數據結果 (最終質感版) */}
                    <div className="lg:col-span-7">
                        <div className="bg-[#1E293B] rounded-[2rem] shadow-2xl p-6 md:p-10 relative overflow-hidden h-full min-h-[380px] md:min-h-0 flex flex-col justify-center border border-white/10 text-white group">
                            {/* 質感背景 */}
                            <div className="absolute -top-32 -right-32 w-64 md:w-80 h-64 md:h-80 bg-blue-500/10 rounded-full blur-[80px] group-hover:bg-blue-400/20 transition-all duration-1000"></div>
                            
                            <div className="relative z-10 w-full">
                                <div className="flex justify-between items-start mb-8 md:mb-10">
                                    <div className="flex-1">
                                        <h3 className="text-2xl md:text-3xl font-black tracking-tight mb-1 flex items-baseline gap-1.5 flex-wrap">
                                            {formData.name || '客戶本人'}<span className="text-xs md:text-sm font-normal text-white/30">{formData.gender === 'male' ? '先生' : '女士'}</span>
                                        </h3>
                                        <p className="text-white/40 text-[10px] md:text-[12px] font-bold tracking-[0.05em] uppercase">
                                            {insAge} 歲 | {formData.product}{formData.plan} | {formData.term} 年期
                                        </p>
                                    </div>
                                    <div className="text-right">
                                        {/* 放大保障槓桿倍率標籤 */}
                                        <p className="text-white/30 text-[14px] md:text-[18px] font-black mb-1 uppercase tracking-widest">保障槓桿倍率</p>
                                        {annualPremium > 0 && (
                                            <div className="text-4xl md:text-6xl font-black text-emerald-400 italic leading-none tracking-tighter transition-transform group-hover:scale-105 duration-300">
                                                {mag} <span className="text-sm md:text-lg font-black ml-[-4px] not-italic text-emerald-500/70">倍</span>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className="mb-10 md:mb-14">
                                    {/* 顯著放大「最高醫療總額」標籤 */}
                                    <p className="text-blue-300/50 text-[24px] md:text-[32px] font-black mb-2 md:mb-4 uppercase tracking-[0.2em] leading-tight">最高醫療總額</p>
                                    <div className="text-5xl sm:text-6xl md:text-8xl font-black tracking-tighter leading-none flex items-baseline animate-in fade-in slide-in-from-left-4 duration-1000">
                                        <span className="text-xl md:text-3xl font-black mr-1 md:mr-2 text-blue-500/80 drop-shadow-[0_0_15px_rgba(59,130,246,0.3)]">$</span>
                                        <span className="truncate">{fmt(coverage).replace('$', '').replace('TWD', '').trim()}</span>
                                    </div>
                                </div>
                                
                                <div className="grid grid-cols-2 gap-4 md:gap-10 pt-6 md:pt-8 border-t border-white/10">
                                    <div className="space-y-1.5">
                                        {/* 放大標籤字體 */}
                                        <p className="text-white/30 text-[14px] md:text-[18px] font-black uppercase tracking-widest">年繳保費</p>
                                        <div className="text-xl sm:text-2xl md:text-4xl font-black text-blue-400 tracking-tight leading-tight">
                                            {annualPremium === -3 ? <span className="text-xs md:text-sm font-bold text-white/20 italic">查無費率</span> : (annualPremium > 0 ? fmt(annualPremium) : '--')}
                                        </div>
                                    </div>
                                    <div className="space-y-1.5 pl-3 md:pl-10 border-l border-white/5">
                                        {/* 放大標籤字體 */}
                                        <p className="text-white/30 text-[14px] md:text-[18px] font-black uppercase tracking-widest">總繳保費</p>
                                        <div className="text-xl sm:text-2xl md:text-4xl font-black text-white/90 tracking-tight leading-tight">
                                            {total > 0 ? fmt(total) : '--'}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        const initIcons = () => { if (window.lucide) { lucide.createIcons(); } else { setTimeout(initIcons, 50); } };
        initIcons();
    </script>
</body>
</html>
